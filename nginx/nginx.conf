worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # Upstreams — Docker DNS resolves to the service containers.
  upstream user_svc    { server user-service:4001; }
  upstream catalog_svc { server catalog-service:4002; }
  upstream seat_svc    { server seat-service:4003; }
  upstream booking_svc { server booking-service:4004; }
  upstream reco_svc    { server recommendation-service:4005; }

  # Rate-limit write endpoints (booking creation) to blunt abuse.
  limit_req_zone $binary_remote_addr zone=booking_rl:10m rate=10r/s;

  # WebSocket upgrade map.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- REST routes ----
    location /api/users/       { proxy_pass http://user_svc/; }
    location /api/catalog/     { proxy_pass http://catalog_svc/; }
    location /api/seats/       { proxy_pass http://seat_svc/; }
    location /api/recommend/   { proxy_pass http://reco_svc/; }

    location /api/bookings/ {
      limit_req zone=booking_rl burst=20 nodelay;
      proxy_pass http://booking_svc/;
    }

    # ---- WebSocket route (seat status pub/sub) ----
    location /ws/seats/ {
      proxy_pass http://seat_svc/;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Socket.io default path (if clients don't rewrite).
    location /socket.io/ {
      proxy_pass http://seat_svc;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }

    location /healthz { return 200 "ok\n"; }
  }
}
